name: Deploy archive to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build archive binary
      run: go build -o archive ./cmd/archive

    - name: Generate archive
      run: ./archive

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4
        
    - name: Upload artifact within GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: './out'
          
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
