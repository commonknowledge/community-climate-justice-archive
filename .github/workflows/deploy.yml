name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - feature/consult-4341-get-a-html-template-hello-world-written-to-disk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.3'
          
      - name: Build and generate site
        run: |
          go build -o archive ./cmd/archive
          # Run the binary to generate the static site
          ./archive

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out