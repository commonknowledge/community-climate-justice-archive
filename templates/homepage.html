<head>
	<title>{{.Title}}</title>
    <meta name="description" content="{{.Description}}">
    <style>
        body {
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
        }
        header {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header p {
            text-transform: lowercase;
        }

        .taxonomy-list {
            list-style-type: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dudley People's School for Climate Justice</h1>   
        <p>Time Portal</p>
    </header>

    <h2>Themes</h2>
    <ul class="taxonomy-list">{{range .Themes}}
        <li>{{.Title}}</li>{{end}}
    </ul>

    <h2>Types</h2>
    <ul class="taxonomy-list">{{range .Types}}
        <li><a href="types/{{.URL}}.html">{{.Title}}</a></li>{{end}}
    </ul>

    <h2>Wander through our archive</h2>
    <div>{{range .Images}}
        <a href="images/{{.Filename}}"><img src="images/{{.Filename}}" alt="{{.AlternativeText}}" width="200"></a>{{end}}
    </div>
</body>
