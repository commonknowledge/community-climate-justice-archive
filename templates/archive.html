<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <meta name="description" content="{{.Description}}">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <script src="/js/archive-filters.js"></script>
    {{template "grid-code" .}}
</head>

<body>
    {{template "header" .}}

    <main class="main-content archive">
        <!-- Archive Header with Count -->
        <div class="archive-header">
            <h2 id="explore-archive" class="archive-header-title">All items from the archive (<span id="total-count">0</span>)</h2>
            <button type="button" id="clear-filters" class="clear-filters-button-top">
                <span class="clear-filters-text">Clear filters</span>
                <span class="clear-filters-icon">×</span>
            </button>
        </div>
        
        <!-- Sticky Filter Controls -->
        <div class="archive-filters-container">
            <div class="archive-filters" id="archive-filters">
                <div class="filter-dropdown" id="theme-dropdown">
                    <button class="filter-dropdown-button" id="theme-button">
                        <span class="filter-dropdown-text">Themes</span>
                        <span class="filter-dropdown-arrow">▼</span>
                    </button>
                    <div class="filter-dropdown-content" id="theme-content"></div>
                </div>
                
                <div class="filter-dropdown" id="type-dropdown">
                    <button class="filter-dropdown-button" id="type-button">
                        <span class="filter-dropdown-text">Types</span>
                        <span class="filter-dropdown-arrow">▼</span>
                    </button>
                    <div class="filter-dropdown-content" id="type-content"></div>
                </div>
                
            </div>
            
            <!-- Active Filters Display -->
            <div class="active-filters" id="active-filters" style="display: none;">
                <span class="active-filters-label">Active filters:</span>
                <div class="active-filters-list" id="active-filters-list"></div>
            </div>
        </div>
        
        <!-- Stories Container -->
        <div class="stories-list" id="stories-container">
            {{template "stories-list" .}}
        </div>
    </main>

    {{template "footer" .}}
</body>

</html>
