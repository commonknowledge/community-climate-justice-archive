{{define "grid-code"}}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const HOVER_SHOW_DELAY = 150;
        const HOVER_HIDE_DELAY = 100;

        const storyImageContainers = document.querySelectorAll('.story-image-container');
        const storyPopups = document.querySelectorAll('.story-popup');

        if (storyImageContainers.length === 0) {
            console.log('Could not find story containers');
        }

        // Cache popup references for better performance
        const popupCache = new Map();
        storyPopups.forEach(popup => {
            const storyId = popup.dataset.storyPopupId;
            if (storyId) {
                popupCache.set(storyId, popup);
            }
        });

        // Global timeout tracking to prevent race conditions
        let globalHideTimeout = null;

        // Helper to coerce dataset boolean values
        const isOpen = (popup) => popup.dataset.storyOpen === 'true';

        function closeAllPopups() {
            // Clear any pending hide timeout
            if (globalHideTimeout) {
                clearTimeout(globalHideTimeout);
                globalHideTimeout = null;
            }

            const openStoryPopups = document.querySelectorAll('.story-popup[data-story-open="true"]');
            openStoryPopups.forEach(popup => {
                popup.style.display = 'none';
                popup.dataset.storyOpen = false;
            });
        }

        function showPopup(container) {
            const storyId = container.dataset.storyId;
            console.log(`Opening popup for story ${storyId}`);

            let storyPopup = popupCache.get(storyId);

            // If popup not in cache, try to find it in DOM (for dynamically created popups)
            if (!storyPopup) {
                storyPopup = document.querySelector(`[data-story-popup-id="${storyId}"]`);
                if (storyPopup) {
                    popupCache.set(storyId, storyPopup);
                }
            }

            if (!storyPopup) {
                console.log(`Could not find story popup for story ${storyId}`);
                return;
            }

            // Lazy-load the popup image
            const img = storyPopup.querySelector('.popup-img');
            if (img && !img.src) {
                img.src = img.dataset.src;
            }

            storyPopup.style.display = 'block';
            storyPopup.dataset.storyOpen = true;
        }

        function hidePopup(storyId) {
            let storyPopup = popupCache.get(storyId);
            
            // If popup not in cache, try to find it in DOM (for dynamically created popups)
            if (!storyPopup) {
                storyPopup = document.querySelector(`[data-story-popup-id="${storyId}"]`);
                if (storyPopup) {
                    popupCache.set(storyId, storyPopup);
                }
            }
            
            if (storyPopup && isOpen(storyPopup)) {
                storyPopup.style.display = 'none';
                storyPopup.dataset.storyOpen = false;
            }
        }

        // Use event delegation for story container hover events to handle dynamically created elements
        let hoverTimeouts = new Map();
        
        document.addEventListener('mouseenter', (e) => {
            const container = e.target.closest('.story-image-container');
            if (!container) return;
            
            const storyId = container.dataset.storyId;
            if (!storyId) return;
            
            // Clear any existing timeouts for this story
            if (hoverTimeouts.has(storyId)) {
                clearTimeout(hoverTimeouts.get(storyId));
                hoverTimeouts.delete(storyId);
            }
            if (globalHideTimeout) {
                clearTimeout(globalHideTimeout);
                globalHideTimeout = null;
            }
            
            // Close other popups first
            closeAllPopups();
            
            // Show popup after delay
            const timeout = setTimeout(() => {
                showPopup(container);
                hoverTimeouts.delete(storyId);
            }, HOVER_SHOW_DELAY);
            hoverTimeouts.set(storyId, timeout);
        }, true);

        document.addEventListener('mouseleave', (e) => {
            const container = e.target.closest('.story-image-container');
            if (!container) return;
            
            const storyId = container.dataset.storyId;
            if (!storyId) return;
            
            // Clear the show timeout if still pending
            if (hoverTimeouts.has(storyId)) {
                clearTimeout(hoverTimeouts.get(storyId));
                hoverTimeouts.delete(storyId);
            }
            
            // Schedule hide after delay
            globalHideTimeout = setTimeout(() => {
                hidePopup(storyId);
                globalHideTimeout = null;
            }, HOVER_HIDE_DELAY);
        }, true);

        // Use event delegation for popup hover events to handle dynamically created popups
        document.addEventListener('mouseenter', (e) => {
            const popup = e.target.closest('.story-popup');
            if (!popup) return;
            
            // Cancel any pending hide timeout
            if (globalHideTimeout) {
                clearTimeout(globalHideTimeout);
                globalHideTimeout = null;
            }
            popup.dataset.storyOpen = true;
        }, true);

        document.addEventListener('mouseleave', (e) => {
            const popup = e.target.closest('.story-popup');
            if (!popup) return;
            
            globalHideTimeout = setTimeout(() => {
                popup.style.display = 'none';
                popup.dataset.storyOpen = false;
                globalHideTimeout = null;
            }, HOVER_HIDE_DELAY);
        }, true);
    });
</script>
{{end}}
