{{define "header"}}
<header>
    <div class="main-header">
        <h1><a href="/">Dudley Time Portal</a></h1>
        <nav class="header-nav">
            <a class="dashed-button" href="/">Wander</a>
            <a class="dashed-button" href="/archive.html">Archive</a>
            <a class="dashed-button random-story-link" href="{{.RandomStoryURL}}">Random</a>
            <a class="dashed-button" href="https://nocodb-r87d.onrender.com/dashboard/#/nc/form/22c1e813-ba2f-41a0-8bb8-bd2b0c5aa3ad" target="_blank" rel="noopener noreferrer">Add</a>
        </nav>
    </div>
</header>
<script>
    window.storyUrls = {{.StoriesJSON}};
    (function() {
        const randomLink = document.querySelector('.random-story-link');
        if (!randomLink) return;
        
        function updateRandomLink() {
            if (window.storyUrls && window.storyUrls.length > 0) {
                const randomUrl = window.storyUrls[Math.floor(Math.random() * window.storyUrls.length)];
                const baseUrl = window.location.origin;
                randomLink.href = baseUrl + '/' + randomUrl;
            }
        }

        updateRandomLink();
        
        randomLink.addEventListener('click', function(e) {
            updateRandomLink();
        });
    })();

    // Highlight current page navigation button
    (function() {
        const navButtons = document.querySelectorAll('.header-nav .dashed-button');
        const currentPath = window.location.pathname;
        
        navButtons.forEach(button => {
            const href = button.getAttribute('href');
            
            // Check if current page matches the button's href
            if (currentPath === href || 
                (currentPath === '/' && href === '/') ||
                (currentPath.includes('archive') && href === '/archive.html') ||
                (currentPath.includes('wander') && href === '/wander.html')) {
                button.style.backgroundColor = '#FFFF99';
            }
        });
    })();
</script>
{{end}}
