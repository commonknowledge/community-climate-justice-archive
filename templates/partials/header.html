{{define "header"}}
<header>
    <h1>Dudley People's School for Climate Justice</h1>
    <p>Time Portal</p>
    <nav class="header-nav">
        <a class="dashed-button" href="#">Wander</a>
        <a class="dashed-button" href="#">Map</a>
        <a class="dashed-button random-story-link" href="{{.RandomStoryURL}}">Random</a>
        <a class="dashed-button" href="#">Search</a>
    </nav>
    <script>
        (function() {
            const randomLink = document.querySelector('.random-story-link');
            if (!randomLink) return;
            
            function updateRandomLink() {
                if (window.stories && window.stories.length > 0) {
                    const randomStory = window.stories[Math.floor(Math.random() * window.stories.length)];
                    randomLink.href = randomStory.URL;
                }
            }

            updateRandomLink();
            
            randomLink.addEventListener('click', function(e) {
                updateRandomLink();
            });
        })();
    </script>
</header>
{{end}}
