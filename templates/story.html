<head>
    <title>{{.Title}} - A story in the Dudley People's School for Climate Justice</title>
    <meta name="description" content="{{.Description}}">
</head>

<body>
    {{$story := .Story}}
    {{with $story.GetStoryImage}}
    {{if .URL}}
    <img src="{{.URL}}" alt="{{.AlternativeText}}">
    {{else}}
    <div>No image</div>
    {{end}}
    {{end}}
    <h1>{{.Title}}</h1>
</body>
