<!DOCTYPE html>
<html lang="en-GB">

<head>
    <title>{{.Title}} - Time Period</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/styles.css">
    {{template "grid-code" .}}
</head>

<body>
    {{template "header" .}}

        {{template "stories-list" .}}
    </div>
    {{template "footer" .}}
</body>

</html>
