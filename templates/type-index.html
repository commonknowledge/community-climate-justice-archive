<head>
    <title>{{.Title}} Type</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    {{template "header" .}}
    <h1 class="type-index-header"><span class="tag large" style="background-color: {{.TaxonomyColour}};">{{.Title}}</span> - A type in the Dudley People's School for Climate Justice</h1>
    <p class="type-index-description">{{.Description}}</p>
    <div class="stories-list">
        {{range .Stories}}
        <div class="story">
            {{$story := .}}
            {{ with .GetStoryImage }}
            {{ if .URL }}
            <a href="..{{$story.URL}}"><img src="..{{.URL}}" alt="{{.AlternativeText}}"></a>
            {{ else }}
            <div>No image</div>
            {{ end }}
            {{ end }}
        </div>
        {{end}}
    </div>
    {{template "footer" .}}
</body>
